# ==================== DNSMASQ FILTERING ====================
# Resuelve solo dominios en /etc/dnsmasq/allowlist.txt.
# El resto responde NXDOMAIN.

# No leer /etc/resolv.conf
no-resolv

# Upstream DNS (Cloudflare)
server=1.1.1.1
server=1.0.0.1

# Escuchar en la IP del contenedor
listen-address=0.0.0.0

# Solo respuestas IPv4
listen-address=172.28.0.254

# Tamaño de cache
cache-size=1000

# Log
log-queries
log-facility=/var/log/dnsmasq.log

# ====== Allowlist ======
# Implementada vía /etc/hosts del contenedor dnsmasq (más simple que recompilar
# dnsmasq con patches). El script de setup genera /etc/hosts a partir de
# allowlist.txt usando `dig` contra 1.1.1.1 y los pega en /etc/hosts.dnsmasq.
addn-hosts=/etc/dnsmasq/hosts.allowlist

# Por defecto, no resolver dominios que no estén en /etc/hosts
# (esto se logra no configurando server= upstream; en su lugar, solo
# respondemos desde /etc/hosts.allowlist)
# Descomentar la siguiente línea para modo estricto (sin upstream):
# domain-needed
# bogus-priv
