# ==================== SQUID ALLOWLIST PROXY ====================
# Proxy forward que solo permite dominios aprobados. Los sandboxes con
# networkMode: "allowlist" usan este proxy vía HTTP_PROXY/HTTPS_PROXY.
#
# Para añadir un dominio nuevo, agregar línea al acl allowlist_domains.

acl localnet src 172.28.0.0/16
acl allowlist_domains dstdomain "/etc/squid/allowlist.txt"

# Bloquear metadata service de cloud (AWS/GCP/Azure)
acl cloud_metadata dst 169.254.169.254/32
acl cloud_metadata_v6 dst fe80::a9fe:a9fe/128

# Bloquear IPs internas del host
acl internal_net dst 10.0.0.0/8
acl internal_net2 dst 172.16.0.0/12
acl internal_net3 dst 192.168.0.0/16
acl loopback dst 127.0.0.0/8

# Puerto estándar
acl Safe_ports port 80 443
acl SSL_ports port 443

# Reglas
http_access deny cloud_metadata
http_access deny cloud_metadata_v6
http_access deny internal_net
http_access deny internal_net2
http_access deny internal_net3
http_access deny loopback
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow localnet allowlist_domains
http_access deny all

# Configuración del proxy
http_port 3128
cache deny all
access_log /var/log/squid/access.log squid
cache_log /var/log/squid/cache.log
cache_mem 64 MB
maximum_object_size 0
client_lifetime 5 minutes
connect_timeout 30 seconds
read_timeout 5 minutes

# No cachear nada (es un proxy de filtrado, no de aceleración)
cache deny all

# Forwarding via IPv4 only
dns_v4_first on
