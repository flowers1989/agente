# ==================== DOCKER-COMPOSE: RED ALLOWLIST ====================
# Levanta la red Docker `mexa-sandbox-net` (172.28.0.0/16) con dos servicios:
#   - squid: proxy HTTP/S con allowlist (172.28.0.253:3128)
#   - dnsmasq: DNS que resuelve solo dominios allowlisted (172.28.0.254:53)
#
# Los sandboxes con networkMode: "allowlist" se conectan a esta red y usan
# estos servicios. Los que usan networkMode: "none" no tienen red.
#
# Uso:
#   cd sandbox/network && docker compose up -d

services:
  squid:
    image: ubuntu/squid:latest
    container_name: mexa-squid
    restart: unless-stopped
    networks:
      sandbox-net:
        ipv4_address: 172.28.0.253
    volumes:
      - ./squid.conf:/etc/squid/squid.conf:ro
      - ./allowlist.txt:/etc/squid/allowlist.txt:ro
      - squid-logs:/var/log/squid
    ports:
      - "127.0.0.1:3129:3128"  # solo para debugging desde el host
    mem_limit: 256m
    cpus: 0.5

  dnsmasq:
    image: jpillora/dnsmasq:latest
    container_name: mexa-dnsmasq
    restart: unless-stopped
    networks:
      sandbox-net:
        ipv4_address: 172.28.0.254
    volumes:
      - ./dnsmasq.conf:/etc/dnsmasq.conf:ro
      - ./allowlist.txt:/etc/dnsmasq/allowlist.txt:ro
    ports:
      - "127.0.0.1:5354:53/udp"
    mem_limit: 64m
    cpus: 0.25
    command: --no-daemon --log-facility=- --conf-file=/etc/dnsmasq.conf

networks:
  sandbox-net:
    name: mexa-sandbox-net
    driver: bridge
    internal: false  # el proxy necesita salida a internet
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1

volumes:
  squid-logs:
